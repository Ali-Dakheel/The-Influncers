<div id='root'><div class='wrap'>
  <div class='eye'>The Problem</div>
  <h1>Influencer marketing is<br><em>broken by design.</em></h1>
  <p class='sub'>The platforms that exist were built before AI. They manage databases, not relationships. Every campaign still requires dozens of human touchpoints that should not exist.</p>
  <div class='prob-grid'>
    <div class='prob'>
      <div class='prob-icon'>📋</div>
      <div class='prob-title'>Everything is manual</div>
      <div class='prob-body'>Briefing, matching, approving drafts, chasing payments, rescheduling — every campaign requires a human at every step. One account manager handles a fraction of what they should. Scale is impossible without headcount.</div>
    </div>
    <div class='prob'>
      <div class='prob-icon'>📊</div>
      <div class='prob-title'>Reporting only looks backwards</div>
      <div class='prob-body'>Every platform generates reports after campaigns end. No platform pushes live intelligence, predicts outcomes before booking, or provides mid-campaign guidance. You find out what went wrong after it already went wrong.</div>
    </div>
    <div class='prob'>
      <div class='prob-icon'>🔄</div>
      <div class='prob-title'>No switching cost — no loyalty</div>
      <div class='prob-body'>Influencers and brands can export their data in a click and move to any competitor. No platform has built something that accumulates knowledge over time and becomes genuinely painful to leave.</div>
    </div>
    <div class='prob'>
      <div class='prob-icon'>🌍</div>
      <div class='prob-title'>No real multi-market architecture</div>
      <div class='prob-body'>Every major platform is built for one market. Country-level admin, multi-currency invoicing, language-specific matching, market-by-market performance views — either absent or badly bolted on.</div>
    </div>
    <div class='prob'>
      <div class='prob-icon'>🔴</div>
      <div class='prob-title'>No crisis infrastructure</div>
      <div class='prob-body'>When something goes wrong — brand crisis, influencer scandal — there is no mechanism to halt all campaigns simultaneously. Brands must contact each influencer individually. This does not exist anywhere.</div>
    </div>
  </div>
  <div class='stat-row'>
    <div class='stat'><div class='sn'>80%</div><div class='sl'>of influencer marketing operations still involve significant manual work</div></div>
    <div class='stat'><div class='sn'>$32B</div><div class='sl'>global market in 2025 — growing to $70B+ by 2032. The timing is now.</div></div>
    <div class='stat'><div class='sn'>0</div><div class='sl'>platforms built AI-native from scratch. Every competitor bolted AI onto a legacy stack.</div></div>
  </div>
  <div class='quote'>
    <div class='qt'>&ldquo;Influencers treated as rows in a spreadsheet. Reports that only look backwards. One person firefighting between clients, WhatsApp groups, and an Excel sheet of micro-influencers.&rdquo;</div>
    <div class='qa'>The reality of running campaigns today</div>
  </div>
</div></div>

      <div>
        <div class='cap-title'>Campaign Marketplace</div>
        <div class='cap-body'>Brands create briefs in minutes. Influencers browse, pitch via video, and apply. AI matches and surfaces the right creators before a human even looks. Full audit trail — every interaction becomes training data.</div>
        <span class='cap-tag'>Phase 1</span>
      </div>
    </div>
    <div class='cap'>
      <div class='cap-icon'>🤖</div>
      <div>
        <div class='cap-title'>AI Draft Reviewer</div>
        <div class='cap-body'>Every draft is reviewed by AI before any human sees it. Wrong environment, audio problems, incorrect discount code, brief mismatch — caught automatically in under 60 seconds. No human needed to catch quality problems.</div>
        <span class='cap-tag'>POC</span>
      </div>
    </div>
    <div class='cap'>
      <div class='cap-icon'>📱</div>
      <div>
        <div class='cap-title'>Creator OS</div>
        <div class='cap-body'>The influencer's entire business lives here — income tracking, performance history, calibrated pricing, AI coaching, risk warnings, ratings. After 10 campaigns, leaving this platform means leaving their business behind.</div>
        <span class='cap-tag'>Phase 1</span>
      </div>
    </div>

<script>
var cur=0,N=9;
var pcts=['11%','22%','33%','44%','55%','66%','77%','88%','100%'];
function sw(n){
  if(n===cur)return;
  document.getElementById('sf-'+cur).classList.remove('active');
  document.querySelectorAll('.ntab')[cur].classList.remove('active');
  cur=n;
  document.getElementById('sf-'+cur).classList.add('active');
  document.querySelectorAll('.ntab')[cur].classList.add('active');
  document.getElementById('mpbf').style.width=pcts[cur];
}
document.addEventListener('keydown',function(e){
  if(e.shiftKey&&e.key==='ArrowRight'){e.preventDefault();sw(Math.min(cur+1,N-1));}
  if(e.shiftKey&&e.key==='ArrowLeft'){e.preventDefault();sw(Math.max(cur-1,0));}
});
</script>
